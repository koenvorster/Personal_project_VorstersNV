name: Deploy – Google Cloud Run

on:
  # Alleen deployen als de CI-workflow succesvol is op main
  workflow_run:
    workflows: ["CI – Testen & Linting"]
    types: [completed]
    branches: [main]

env:
  GCP_REGION: europe-west1
  BACKEND_SERVICE: vorstersNV-api
  FRONTEND_SERVICE: vorstersNV-frontend
  REGISTRY: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/vorstersNV

jobs:
  # Guard: alleen deployen als CI groen was
  check-ci:
    name: CI-status controleren
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI geslaagd – deployment gaat door
        run: echo "✅ CI succesvol – starten met deployment naar Cloud Run"

  deploy-backend:
    name: Backend deployen naar Cloud Run
    runs-on: ubuntu-latest
    environment: productie
    needs: check-ci

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Authenticeren bij Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud CLI instellen
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker configureren voor Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Webhook service image bouwen en pushen
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/webhooks:${{ github.sha }} \
            -f Dockerfile.webhooks .
          docker push ${{ env.REGISTRY }}/webhooks:${{ github.sha }}

      - name: Java backend image bouwen en pushen
        run: |
          docker build -t ${{ env.REGISTRY }}/backend:${{ github.sha }} ./backend
          docker push ${{ env.REGISTRY }}/backend:${{ github.sha }}

      - name: Backend deployen naar Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image ${{ env.REGISTRY }}/backend:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances ${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:vorstersNV-db \
            --set-env-vars "SPRING_PROFILES_ACTIVE=cloudrun,CLOUD_SQL_INSTANCE=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:vorstersNV-db,DB_PASSWORD=${{ secrets.DB_PASSWORD }}"

      - name: Webhook service deployen naar Cloud Run
        run: |
          gcloud run deploy vorstersNV-webhooks \
            --image ${{ env.REGISTRY }}/webhooks:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }},DB_URL=${{ secrets.DB_URL }},REDIS_URL=${{ secrets.REDIS_URL }}"

  deploy-frontend:
    name: Frontend deployen naar Cloud Run
    runs-on: ubuntu-latest
    environment: productie
    needs: deploy-backend

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Authenticeren bij Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud CLI instellen
        uses: google-github-actions/setup-gcloud@v2

      - name: Backend URL ophalen
        id: backend-url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Docker configureren voor Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Frontend image bouwen en pushen
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }} \
            -t ${{ env.REGISTRY }}/frontend:${{ github.sha }} \
            ./frontend
          docker push ${{ env.REGISTRY }}/frontend:${{ github.sha }}

      - name: Frontend deployen naar Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.REGISTRY }}/frontend:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }}"

  notify-deploy:
    name: Deploy-status rapporteren
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Deploy-status controleren
        run: |
          if [ "${{ needs.deploy-backend.result }}" == "success" ] && \
             [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
            echo "✅ Deployment succesvol – backend, webhooks en frontend live op Cloud Run!"
            echo "   Commit: ${{ github.sha }}"
          else
            echo "❌ Deployment mislukt – controleer de logs hierboven."
            echo "   Backend: ${{ needs.deploy-backend.result }}"
            echo "   Frontend: ${{ needs.deploy-frontend.result }}"
            exit 1
          fi

