name: audit-reporting
version: "1.0"
description: "Audit trails, decision logging en compliance rapportage"
lane: deterministic
audience: compliance
risk: high

maturity:
  level: L4
  label: business-critical
  eval_required: true
  human_approval_required: true
  min_first_pass_score: 0.95

assurance:
  min_schema_validation_rate: 0.99

operational:
  owner: team-compliance
  sla_tier: platinum
  cost_budget_monthly_eur: 30.0
  preferred_model: llama3
  escalation_model: llama3

release:
  rollout_ring: ring-4
  feature_flag: "ai.capability.audit-reporting.v1"

agents:
  - audit-reporter

eval_metrics:
  target_success_rate: 0.95
  target_avg_score: 0.85
  target_latency_ms: 2500
  alert_threshold_score: 0.70
  review_interval_days: 7
