# Platform beschikbaarheid
platforms:
  claude:
    type: specialist
    strength: complexe analyse, codebase, documentatie, chaining
    agent_dir: .claude/agents/
    skill_dir: .claude/skills/

  copilot:
    type: repo
    strength: repo context, PR analyse, code linking
    requires: GitHub Copilot Chat

  ollama:
    type: local-ai
    strength: lokale inferentie, business-specifieke agents
    agent_dir: agents/
    runner: agent_runner.py
