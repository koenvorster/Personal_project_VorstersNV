# In-memory database voor tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate maakt schema aan voor tests (Flyway disabled)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Geen echte Keycloak nodig in tests – jwk-set-uri wordt pas geladen bij JWT-validatie, niet op startup
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9999/realms/test/protocol/openid-connect/certs
