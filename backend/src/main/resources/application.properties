spring.application.name=vorstersNV-api

# Database (lokale dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/vorstersNV
spring.datasource.username=vorstersNV
spring.datasource.password=dev-password-change-me
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA – ddl-auto=validate (Flyway beheert het schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson – snake_case voor alle JSON responses en requests
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Keycloak / OAuth2 resource server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/vorstersNV

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
