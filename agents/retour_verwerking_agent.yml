name: retour_verwerking_agent
version: "1.0"
type: sub_agent
description: "Sub-agent voor het verwerken van retouraanvragen bij VorstersNV"
model: llama3
temperature: 0.2
max_tokens: 1024
language: nl
parent_agents:
  - klantenservice_agent
  - order_verwerking_agent

system_prompt_ref: "prompts/system/retour_verwerking_v2.txt"
preprompt_ref: "prompts/preprompt/retour_verwerking_v2.txt"

capabilities:
  - valideer_retouraanvraag
  - genereer_retourbevestiging
  - verwerk_terugbetaling
  - maak_creditnota
  - update_voorraad_na_retour
  - genereer_retourlabel

input_schema:
  type: object
  properties:
    retour_id:
      type: string
    order_id:
      type: string
    aanvraagdatum:
      type: string
    retour_reden:
      type: string
      enum: [defect, verkeerd_product, niet_zoals_verwacht, bestelfout_klant, te_laat]
    klant_naam:
      type: string
    klant_email:
      type: string
    producten:
      type: array
    orderdatum:
      type: string
    ontvangstdatum:
      type: string

output_schema:
  type: object
  properties:
    geldig:
      type: boolean
    verwerkingsactie:
      type: string
      enum: [terugbetaling, ruil, creditnota, afwijzen]
    retournummer:
      type: string
    klantbericht:
      type: string
    verzendinstructies:
      type: string
    terugbetalingsbedrag:
      type: number
    verwerkingstijd_werkdagen:
      type: integer

tools:
  - name: zoek_order
    description: "Haal orderdetails op voor verificatie"
    endpoint: "/api/orders/{order_id}"
  - name: initieer_terugbetaling
    description: "Start een terugbetaling via Mollie"
    endpoint: "/api/payments/refund"
  - name: update_voorraad
    description: "Pas voorraad aan na ontvangst retourzending"
    endpoint: "/api/inventory/update"
  - name: genereer_creditnota
    description: "Maak een creditnota aan voor de retour"
    endpoint: "/api/invoices/credit-note"
  - name: stuur_retourbevestiging
    description: "Stuur retourbevestiging naar klant via e-mail"
    endpoint: "/api/notifications/email"

evaluation:
  metrics:
    - verwerkingstijd_seconden
    - correct_beleid_percentage
    - klant_tevredenheid_score
  feedback_loop: false
  log_dir: "logs/retour_verwerking"

iteration_log: "prompts/preprompt/retour_verwerking_iterations.yml"
