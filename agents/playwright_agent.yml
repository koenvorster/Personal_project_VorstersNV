# DEPRECATED: Dit bestand is hernoemd naar playwright_mcp_agent.yml
# Gebruik playwright_mcp_agent.yml — dit bestand blijft als backward-compatible alias.
canonical_file: agents/playwright_mcp_agent.yml

name: playwright_mcp_agent
version: 1.0
type: automation_agent
description: |
  Playwright MCP agent - AI-driven browser automation via @playwright/mcp.
  NIET voor E2E test-suites (dat is Cypress). WEL voor: agentic browser workflows,
  webinteracties aangestuurd door LLMs, web scraping, formulierautomatie,
  en long-running autonomous browser tasks via MCP protocol.
  CANONICAL FILE: agents/playwright_mcp_agent.yml

model: llama3
temperature: 0.3
max_tokens: 4096
top_p: 0.9

system_prompt_ref: prompts/system/playwright_mcp_system.txt
preprompt_ref: prompts/preprompt/playwright_mcp_v1.yml

# ────────────────────────────────────────────────────────────
# BELANGRIJK: Cypress = E2E testen | Playwright = MCP automatie
# ────────────────────────────────────────────────────────────
role_distinction:
  cypress:
    purpose: "End-to-end testing (test specs, CI pipelines, regressions)"
    install: "npm install cypress --save-dev"
    run: "npx cypress open | npx cypress run"
    output: "Test reports, screenshots, video recordings, JUnit XML"
  playwright_mcp:
    purpose: "AI agent browser automation, MCP-server, agentic workflows"
    install: "npx @playwright/mcp@latest"
    mcp_config: |
      {
        "mcpServers": {
          "playwright": {
            "command": "npx",
            "args": ["@playwright/mcp@latest"]
          }
        }
      }
    output: "Automation results, extracted data, completed web tasks"

capabilities:
  # MCP server & agent setup
  - configure_playwright_mcp_server
  - integrate_mcp_with_llm_agent
  - setup_mcp_in_copilot_cli
  - setup_mcp_in_claude_desktop
  - setup_mcp_in_cursor
  # Browser automation (agent-driven)
  - navigate_web_pages
  - fill_and_submit_forms
  - extract_data_from_pages
  - click_and_interact_elements
  - handle_authentication_flows
  - navigate_accessibility_tree
  - screenshot_and_observe
  # Agentic workflows
  - design_multi_step_web_workflows
  - handle_dynamic_page_content
  - chain_browser_actions
  - retry_on_page_state_change
  - monitor_and_wait_for_conditions
  # Advanced automations
  - automate_order_processing_web
  - automate_supplier_portal_interactions
  - automate_report_downloads
  - scrape_product_data
  - automate_login_and_session

mcp_architecture:
  protocol: "Model Context Protocol (MCP) by Microsoft/Anthropic"
  transport: "stdio (local) or SSE (remote)"
  accessibility_tree: "Playwright reads DOM as accessibility tree - no screenshots needed for LLMs"
  agent_loop: |
    1. LLM receives goal (e.g. 'download latest invoice from supplier portal')
    2. Playwright MCP provides page state via accessibility snapshot
    3. LLM reasons over snapshot, selects action (click, fill, navigate)
    4. MCP executes action in real browser
    5. Updated snapshot fed back to LLM
    6. Loop until goal is achieved
  advantages:
    - "No vision model needed - pure accessibility tree"
    - "Token-efficient structured data vs screenshots"
    - "Stateful sessions - context persists across steps"
    - "Works with any MCP-compatible client (Copilot, Claude, Cursor)"

integration_points:
  - agent: klantenservice_agent
    use_case: "Check order status on external portals"
  - agent: order_verwerking_agent
    use_case: "Submit orders to supplier web portals"
  - agent: voorraad_advies_agent
    use_case: "Scrape supplier stock levels"
  - agent: fraude_detectie_agent
    use_case: "Cross-check customer data on external verification sites"

input_schema:
  type: object
  properties:
    task_description:
      type: string
      description: "High-level goal for the browser automation (e.g. 'Fill in RMA form on supplier portal')"
    
    target_url:
      type: string
      description: "Starting URL for the automation"
    
    credentials:
      type: object
      description: "Auth details (loaded from env, never hardcoded)"
      properties:
        username_env_var: { type: string }
        password_env_var: { type: string }
    
    workflow_steps:
      type: array
      description: "Ordered high-level steps for the agent to execute"
      items:
        type: object
        properties:
          step: { type: string }
          expected_state: { type: string }
          fallback: { type: string }
    
    output_expectation:
      type: string
      enum: [data_extracted, form_submitted, file_downloaded, confirmation_received]

output_schema:
  type: object
  properties:
    mcp_config:
      type: object
      description: "Ready-to-use MCP server configuration block"
      properties:
        server_name: { type: string }
        command: { type: string }
        args: { type: array }
    
    automation_script:
      type: object
      description: "Agent workflow definition (not a test spec)"
      properties:
        goal: { type: string }
        steps:
          type: array
          items:
            type: object
            properties:
              action: { type: string, enum: [navigate, click, fill, select, wait, extract, screenshot, submit] }
              target: { type: string }
              value: { type: string }
              on_failure: { type: string }
        extracted_data: { type: object }
        completion_condition: { type: string }
    
    integration_hooks:
      type: array
      description: "How to connect results back to VorstersNV agents/API"
      items:
        type: object
        properties:
          event: { type: string }
          target_endpoint: { type: string }
          payload_mapping: { type: object }

evaluation:
  - metric: task_completion_rate
    target: ">= 90%"
  - metric: accessibility_tree_navigation_accuracy
    target: ">= 85%"
  - metric: no_hardcoded_credentials
    target: "100% - always env vars"
  - metric: retry_handling
    target: "100% of steps have fallback strategy"

tags:
  - playwright
  - mcp
  - browser-automation
  - agent-driven
  - agentic-workflows
  - llm-browser-control
  - web-scraping
  - form-automation
  - model-context-protocol
