name: order_verwerking_agent
version: "1.1"
type: specialist
description: "AI-agent voor geautomatiseerde orderverwerking en communicatie"
model: llama3
temperature: 0.1
max_tokens: 512
language: nl

system_prompt_ref: "prompts/system/order_verwerking_v2.txt"
preprompt_ref: "prompts/preprompt/order_verwerking_v2.txt"

sub_agents:
  - name: fraude_detectie_agent
    trigger: order_created
    description: "Controleer elke nieuwe order op fraude-signalen"
  - name: email_template_agent
    trigger: klant_communicatie
    description: "Genereer klantgerichte e-mails bij order-events"
  - name: voorraad_advies_agent
    trigger: voorraad_update
    description: "Adviseer inkoper na significante voorraadwijzigingen"

capabilities:
  - valideer_order
  - stuur_bevestiging
  - verwerk_retour
  - genereer_factuur
  - update_voorraad
  - fraude_pre_check
  - priority_order_escalatie
  - batch_order_verwerking

triggers:
  - event: order.created
    webhook: "/webhooks/order-created"
  - event: order.paid
    webhook: "/webhooks/order-paid"
  - event: order.shipped
    webhook: "/webhooks/order-shipped"
  - event: order.cancelled
    webhook: "/webhooks/order-cancelled"

tools:
  - name: update_order_status
    endpoint: "/api/orders/{order_id}/status"
  - name: verstuur_notificatie
    endpoint: "/api/notifications/send"
  - name: genereer_factuur
    endpoint: "/api/invoices/generate"
  - name: update_voorraad
    endpoint: "/api/inventory/update"

evaluation:
  metrics:
    - verwerkingstijd_seconden
    - foutpercentage
    - klantnotificatie_succes
  feedback_loop: true
  log_dir: "logs/order_verwerking"

iteration_log: "prompts/preprompt/order_verwerking_iterations.yml"
