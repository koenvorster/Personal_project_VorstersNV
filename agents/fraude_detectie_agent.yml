name: fraude_detectie_agent
version: "1.0"
type: sub_agent
description: "Sub-agent voor het detecteren van frauduleuze bestellingen bij VorstersNV"
model: llama3
temperature: 0.1
max_tokens: 512
language: nl
parent_agents:
  - order_verwerking_agent
  - klantenservice_agent

system_prompt_ref: "prompts/system/fraude_detectie_v2.txt"
preprompt_ref: "prompts/preprompt/fraude_detectie_v2.txt"

capabilities:
  - risicoscore_berekenen
  - signalen_detecteren
  - blokkeer_aanbeveling_genereren
  - audit_log_aanmaken

input_schema:
  type: object
  properties:
    order_id:
      type: string
    besteldatum:
      type: string
    orderwaarde:
      type: number
    betaalmethode:
      type: string
    klant_id:
      type: string
    account_aanmaakdatum:
      type: string
    aantal_eerdere_orders:
      type: integer
    eerdere_chargebacks:
      type: integer
    klant_email:
      type: string
    bezorgadres:
      type: string
    ip_adres:
      type: string
    adressen_gelijk:
      type: boolean

output_schema:
  type: object
  properties:
    risicoscore:
      type: integer
    risicosignalen:
      type: array
    aanbeveling:
      type: string
      enum: [verwerken, verificatie, review, blokkeren]
    motivatie:
      type: string

tools:
  - name: zoek_klanthistorie
    description: "Haal de volledige orderhistorie van een klant op"
    endpoint: "/api/orders/customer/{klant_id}"
  - name: check_ip_reputatie
    description: "Controleer of een IP-adres bekendstaat als frauduleus"
    endpoint: "/api/fraud/ip-check"
  - name: blokkeer_order
    description: "Blokkeer een order voor verdere verwerking"
    endpoint: "/api/orders/{order_id}/block"

evaluation:
  metrics:
    - vals_positief_percentage
    - vals_negatief_percentage
    - detectietijd_seconden
  feedback_loop: true
  log_dir: "logs/fraude_detectie"

iteration_log: "prompts/preprompt/fraude_detectie_iterations.yml"
