name: seo_agent
version: "1.1"
type: specialist
description: "AI-agent voor SEO-optimalisatie van webshoppagina's en producten"
model: llama3
temperature: 0.5
max_tokens: 1500
language: nl

system_prompt_ref: "prompts/system/seo.txt"
preprompt_ref: "prompts/prepromt/seo_v1.txt"

capabilities:
  - analyseer_keywords
  - optimaliseer_meta_tags
  - genereer_schema_markup
  - analyseer_concurrentie
  - audit_pagina
  - interne_linking_suggesties
  - hreflang_genereren
  - structured_data_valideren

input_schema:
  type: object
  properties:
    pagina_url:
      type: string
    huidige_inhoud:
      type: string
    doelzoekwoorden:
      type: array
    concurrenten:
      type: array

output_schema:
  type: object
  properties:
    aanbevolen_titel:
      type: string
    aanbevolen_meta_description:
      type: string
    primary_keyword:
      type: string
    secondary_keywords:
      type: array
    content_suggesties:
      type: array
    interne_links:
      type: array
    schema_markup:
      type: object
    seo_score:
      type: integer

tools:
  - name: keyword_analyse
    description: "Analyseer zoekvolume en concurrentie voor keywords"
  - name: serp_check
    description: "Controleer huidige positie in zoekmachines"

evaluation:
  metrics:
    - organisch_verkeer
    - keyword_posities
    - klik_door_percentage
  feedback_loop: true
  log_dir: "logs/seo"

iteration_log: "prompts/prepromt/seo_iterations.yml"
