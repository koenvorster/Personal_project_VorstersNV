name: seo_agent
version: "1.1"
description: "AI-agent voor SEO-optimalisatie van webshoppagina's en producten"
model: mistral
temperature: 0.5
max_tokens: 1500
language: nl

system_prompt_ref: "prompts/system/seo.txt"
prepromt_ref: "prompts/prepromt/seo_v1.txt"

capabilities:
  - analyseer_keywords
  - optimaliseer_meta_tags
  - genereer_schema_markup
  - analyseer_concurrentie
  - audit_pagina
  - interne_linking_suggesties
  - hreflang_genereren
  - structured_data_valideren

input_schema:
  pagina_url: string
  huidige_inhoud: string
  doelzoekwoorden: list
  concurrenten: list

output_schema:
  aanbevolen_titel: string
  aanbevolen_meta_description: string
  primary_keyword: string
  secondary_keywords: list
  content_suggesties: list
  interne_links: list
  schema_markup: object
  seo_score: integer

tools:
  - name: keyword_analyse
    description: "Analyseer zoekvolume en concurrentie voor keywords"
  - name: serp_check
    description: "Controleer huidige positie in zoekmachines"

evaluation:
  metrics:
    - organisch_verkeer
    - keyword_posities
    - klik_door_percentage
  feedback_loop: true
  log_dir: "logs/seo"

iteration_log: "prompts/prepromt/seo_iterations.yml"
