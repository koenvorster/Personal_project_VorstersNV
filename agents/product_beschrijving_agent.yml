name: product_beschrijving_agent
version: "1.1"
type: specialist
description: "AI-agent voor het genereren van professionele productbeschrijvingen"
model: llama3
temperature: 0.7
max_tokens: 2048
language: nl

system_prompt_ref: "prompts/system/product_beschrijving.txt"
preprompt_ref: "prompts/prepromt/product_beschrijving_v1.txt"

capabilities:
  - genereer_productbeschrijving
  - genereer_seo_tekst
  - vertaal_beschrijving
  - pas_tone_of_voice_aan
  - schrijf_usp_lijst
  - genereer_faq_sectie
  - herschrijf_bestaande_beschrijving

input_schema:
  type: object
  properties:
    product_naam:
      type: string
    categorie:
      type: string
    kenmerken:
      type: array
    doelgroep:
      type: string
    prijsklasse:
      type: string
      enum: [budget, midden, premium, luxe]
    tone_of_voice:
      type: string
      enum: [professioneel, vriendelijk, luxe, technisch]

output_schema:
  type: object
  properties:
    titel:
      type: string
    korte_beschrijving:
      type: string
    lange_beschrijving:
      type: string
    usp_lijst:
      type: array
    faq:
      type: array
    seo_meta_title:
      type: string
    seo_meta_description:
      type: string
    tags:
      type: array

evaluation:
  metrics:
    - seo_score
    - leesbaarheid_score
    - conversie_percentage
  feedback_loop: true
  log_dir: "logs/product_beschrijving"

iteration_log: "prompts/prepromt/product_beschrijving_iterations.yml"
