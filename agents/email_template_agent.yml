name: email_template_agent
version: "1.0"
description: "Sub-agent voor het genereren van klantgerichte e-mails voor VorstersNV"
model: mistral
temperature: 0.6
max_tokens: 1024
language: nl
role: sub_agent
parent_agents:
  - klantenservice_agent
  - order_verwerking_agent
  - retour_verwerking_agent

system_prompt_ref: "prompts/system/email_template.txt"
prepromt_ref: "prompts/prepromt/email_template_v1.txt"

capabilities:
  - schrijf_orderbevestiging
  - schrijf_verzendbevestiging
  - schrijf_retourbevestiging
  - schrijf_terugbetalingsbevestiging
  - schrijf_vertragingsbericht
  - schrijf_klantklacht_reactie
  - schrijf_backorder_bericht

input_schema:
  email_type:
    type: enum
    values:
      - orderbevestiging
      - verzendbevestiging
      - retourbevestiging
      - terugbetalingsbevestiging
      - vertragingsbericht
      - klachtreactie
      - backorder
  klant_naam: string
  aanspreektitel:
    type: enum
    values: [de heer, mevrouw, beste]
  context: string
  details: object
  tone_of_voice:
    type: enum
    values: [vriendelijk, formeel, empathisch]
    default: vriendelijk
  taal:
    type: enum
    values: [nl, en]
    default: nl

output_schema:
  onderwerpregel: string
  preheader: string
  email_tekst: string
  cta_knoptekst: string
  cta_url: string

evaluation:
  metrics:
    - open_rate
    - click_through_rate
    - klanttevredenheid_score
  feedback_loop: true
  log_dir: "logs/email_template"

iteration_log: "prompts/prepromt/email_template_iterations.yml"
