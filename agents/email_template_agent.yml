name: email_template_agent
version: "2.0"
type: sub_agent
description: "Sub-agent voor het genereren van klantgerichte e-mails voor VorstersNV"
model: llama3
temperature: 0.6
max_tokens: 1024
language: nl
parent_agents:
  - klantenservice_agent
  - order_verwerking_agent
  - retour_verwerking_agent
  - checkout_begeleiding_agent
  - betaling_status_agent

system_prompt_ref: "prompts/system/email_template_v2.txt"
preprompt_ref: "prompts/prepromt/email_template_v2.txt"

capabilities:
  - schrijf_orderbevestiging
  - schrijf_verzendbevestiging
  - schrijf_retourbevestiging
  - schrijf_terugbetalingsbevestiging
  - schrijf_factuurmelding
  - schrijf_vertragingsbericht
  - schrijf_klantklacht_reactie
  - schrijf_backorder_bericht
  - schrijf_betaling_mislukt_notificatie

input_schema:
  type: object
  properties:
    email_type:
      type: string
      enum:
        - orderbevestiging
        - verzendbevestiging
        - retourbevestiging
        - terugbetalingsbevestiging
        - factuurmelding
        - betaling_mislukt
        - vertragingsbericht
        - klachtreactie
        - backorder
    klant_naam:
      type: string
    aanspreektitel:
      type: string
      enum: [de heer, mevrouw, beste]
    context:
      type: string
    details:
      type: object
    tone_of_voice:
      type: string
      enum: [vriendelijk, formeel, empathisch]
      default: vriendelijk
    taal:
      type: string
      enum: [nl, en]
      default: nl

output_schema:
  type: object
  properties:
    onderwerpregel:
      type: string
    preheader:
      type: string
    email_tekst:
      type: string
    cta_knoptekst:
      type: string
    cta_url:
      type: string

evaluation:
  metrics:
    - open_rate
    - click_through_rate
    - klanttevredenheid_score
  feedback_loop: true
  log_dir: "logs/email_template"

iteration_log: "prompts/prepromt/email_template_iterations.yml"
