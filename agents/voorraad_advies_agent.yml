name: voorraad_advies_agent
version: "1.0"
type: sub_agent
description: "Sub-agent voor voorraadanalyse en besteladvies bij VorstersNV"
model: llama3
temperature: 0.2
max_tokens: 2048
language: nl
parent_agents:
  - order_verwerking_agent

system_prompt_ref: "prompts/system/voorraad_advies.txt"
preprompt_ref: "prompts/prepromt/voorraad_advies_v1.txt"

capabilities:
  - analyseer_voorraadniveaus
  - bereken_veiligheidsvoorraad
  - genereer_besteladvies
  - detecteer_overstock
  - detecteer_langzaam_lopend
  - prognose_uitputtingsdatum
  - abc_classificatie

input_schema:
  type: object
  properties:
    datum:
      type: string
    magazijn:
      type: string
    voorraad_data:
      type: array
    verkoop_trends:
      type: array
    inkooporders:
      type: array
    seizoensindex:
      type: number

output_schema:
  type: object
  properties:
    kritieke_producten:
      type: array
    laag_voorraad_producten:
      type: array
    overstock_producten:
      type: array
    langzaam_lopende_producten:
      type: array
    besteladvies:
      type: array
    totaal_inkoopwaarde_aanbevolen:
      type: number

tools:
  - name: haal_voorraad_op
    description: "Haal actuele voorraadniveaus op per product"
    endpoint: "/api/inventory/levels"
  - name: haal_verkoophistorie_op
    description: "Haal verkoophistorie op per product (laatste 90 dagen)"
    endpoint: "/api/analytics/sales-history"
  - name: haal_inkooporders_op
    description: "Haal openstaande inkooporders op"
    endpoint: "/api/inventory/purchase-orders"
  - name: maak_inkoopadvies
    description: "Sla het gegenereerde inkoopadvies op voor de inkoper"
    endpoint: "/api/inventory/purchase-advice"

schedule:
  - cron: "0 6 * * 1"
    description: "Wekelijks maandagochtend besteladvies rapport"
  - trigger: low_stock_alert
    description: "Direct bij kritiek voorraadniveau"

evaluation:
  metrics:
    - voorraad_beschikbaarheid_percentage
    - aantal_stockouts
    - overstock_waarde_euro
  feedback_loop: false
  log_dir: "logs/voorraad_advies"

iteration_log: "prompts/prepromt/voorraad_advies_iterations.yml"
