# ─────────────────────────────────────────────────────────────────────────────
# NIS2 Richtlijn (EU) 2022/2555 — Implementatie voor VorstersNV IT-dienstverlener
# Bijlage I Categorie 11: Beheerde diensten (MSP / Managed Service Provider)
#
# Belgische omzettingswet: Wet van 26 april 2024 houdende omzetting van NIS2
# Van kracht: 18 oktober 2024
# ─────────────────────────────────────────────────────────────────────────────

version: "1.0"
effectief_datum: "2024-10-17"   # NIS2 Belgische omzetting deadline

organisatie:
  naam: VorstersNV
  sector: "Managed IT/AI Services"
  categorie: "Bijlage II — Belangrijke entiteit"
  bevoegd_gezag: "CCN2.be"       # Centre voor Cybersecurity België
  contactpersoon_security: "security@vorsters.be"
  kbo_nummer: "BE0000.000.000"   # TODO: invullen bij registratie CCN2

# ─────────────────────────────────────────────────────────────────────────────
# INCIDENT RESPONSE (NIS2 Art. 23)
# ─────────────────────────────────────────────────────────────────────────────

incident_response:
  meldingsdrempels:
    significant_incident:
      - type: "databreach"
        beschrijving: "Ongeautoriseerde toegang tot klant- of persoonsdata"
        meldingstermijn_initieel: "24 uur"
        meldingstermijn_volledig: "72 uur"
        extra_verplichtingen:
          - "Betrokken klanten informeren indien PII betrokken (GDPR Art. 34)"
          - "Omvang en impact documenteren"

      - type: "service_disruption"
        beschrijving: "Onderbreking van AI-analyseservice of API > 4 uur"
        meldingstermijn_initieel: "24 uur"
        meldingstermijn_volledig: "72 uur"
        meetcriterium: "Aantoonbare impact op > 10% van actieve klantprojecten"

      - type: "supply_chain_compromise"
        beschrijving: "Compromittering van Ollama, PostgreSQL, Mollie of externe API-koppeling"
        meldingstermijn_initieel: "24 uur"
        meldingstermijn_volledig: "72 uur"
        extra_verplichtingen:
          - "Getroffen klanten isoleren en informeren"
          - "Affected credentials onmiddellijk roteren"

      - type: "ransomware_cyberaanval"
        beschrijving: "Ransomware, DDoS of gerichte cyberaanval op VorstersNV-infrastructuur"
        meldingstermijn_initieel: "24 uur"
        actie: "Onmiddellijk systemen isoleren + CCN2.be contacteren"

  contactpunten:
    intern:
      naam: "VorstersNV Security Officer"
      email: "security@vorsters.be"
      beschikbaarheid: "24/7 via on-call rotation"

    extern:
      ccn2_meldpunt: "https://ccb.belgium.be/nl/meld-een-incident"
      ccn2_email: "cert@ccb.belgium.be"
      cert_be: "https://www.cert.be"
      politie_federaal: "Federal Computer Crime Unit (FCCU) — fccu@police.belgium.eu"

  incident_classificatie:
    levels:
      - niveau: "P1_KRITIEK"
        beschrijving: "Actieve breach, ransomware of datadiefstal"
        responstijd: "15 minuten"
        escalatie: "CEO + Security Officer + CCN2.be"

      - niveau: "P2_HOOG"
        beschrijving: "Gedetecteerde aanvalspogingen, DDoS, supply chain alert"
        responstijd: "1 uur"
        escalatie: "Security Officer + Tech Lead"

      - niveau: "P3_MEDIUM"
        beschrijving: "Kwetsbaarheid ontdekt, verdachte activiteit in logs"
        responstijd: "4 uur"
        escalatie: "Tech Lead"

      - niveau: "P4_LAAG"
        beschrijving: "Policy overtreding, configuratiefout zonder actieve exploitatie"
        responstijd: "24 uur"
        escalatie: "Ontwikkelaar + documenteren in decision journal"

# ─────────────────────────────────────────────────────────────────────────────
# BEVEILIGINGSMAATREGELEN (NIS2 Art. 21)
# ─────────────────────────────────────────────────────────────────────────────

beveiligingsmaatregelen:

  - id: "NIS2-M01"
    artikel: "Art. 21(2)(a)"
    naam: "Risicoanalyse en informatiebeveiligingsbeleid"
    status: "geïmplementeerd"
    implementatie:
      - "policies/security-policies.yaml"
      - "ARCHITECTURE.md — Sectie 10: Security Architecture"
      - "Periodieke risicoanalyse per klantproject via ComplianceEngine"
    review_frequentie: "Jaarlijks + na significant incident"

  - id: "NIS2-M02"
    artikel: "Art. 21(2)(b)"
    naam: "Incident behandeling en crisismanagement"
    status: "gedeeltelijk"
    implementatie:
      - "ollama/decision_journal.py — audit trails van AI-beslissingen"
      - "logs/compliance/ — ComplianceEngine rapportage"
    openstaande_acties:
      - "decision_journal.py uitbreiden met gestructureerd incident log schema"
      - "Automatische escalatie-workflow implementeren bij P1/P2 incidents"
    target_datum: "2025-Q1"

  - id: "NIS2-M03"
    artikel: "Art. 21(2)(c)"
    naam: "Business continuïteit, backup en disaster recovery"
    status: "geïmplementeerd"
    implementatie:
      - "Lokale Ollama + PostgreSQL — geen cloud-afhankelijkheid voor kernfunctionaliteit"
      - "Docker Compose met named volumes voor databehoud"
      - "Dagelijkse PostgreSQL dump via pg_dump cron job"
    metrics:
      rto: "4 uur"    # Recovery Time Objective
      rpo: "24 uur"   # Recovery Point Objective
    test_frequentie: "Halfjaarlijks DR-test"

  - id: "NIS2-M04"
    artikel: "Art. 21(2)(d)"
    naam: "Supply chain beveiliging"
    status: "gedeeltelijk"
    implementatie:
      - "policies/nis2-policies.yaml — risicobeoordelingen per component"
      - "ComplianceEngine.check_nis2() — supply chain keyword detectie"
    openstaande_acties:
      - "Software Bill of Materials (SBOM) bijhouden: software_bill_of_materials.json"
      - "Contractuele NIS2-verplichtingen opnemen in leveranciersovereenkomsten"
    componenten:
      - naam: "Ollama"
        versie: "latest"
        type: "AI inference engine"
        risico: "MEDIUM"
        bron: "Open Source — Meta LLAMA license"
        monitoring: "Versie-updates wekelijks controleren"

      - naam: "Mollie Payments"
        versie: "API v2"
        type: "Betalingsverwerker"
        risico: "LAAG"
        certificeringen:
          - "PCI-DSS Level 1"
          - "ISO 27001"
        sla: "99.99% uptime"

      - naam: "PostgreSQL"
        versie: "15+"
        type: "Primaire database"
        risico: "LAAG"
        bron: "Open Source — PostgreSQL Global Development Group"
        monitoring: "CVE monitoring via NIST NVD feed"

      - naam: "Keycloak"
        versie: "24+"
        type: "Identity & Access Management"
        risico: "HOOG"    # Kritieke auth component
        bron: "Open Source — Red Hat"
        monitoring: "Security patches prioritair toepassen binnen 72u"

      - naam: "Next.js"
        versie: "14+"
        type: "Frontend framework"
        risico: "MEDIUM"
        bron: "Open Source — Vercel"
        monitoring: "npm audit wekelijks"

  - id: "NIS2-M05"
    artikel: "Art. 21(2)(e)"
    naam: "Beveiliging bij verwerving, ontwikkeling en onderhoud"
    status: "geïmplementeerd"
    implementatie:
      - "GitHub Actions CI pipeline — automatische build/test bij elke PR"
      - "Ruff linting + mypy type checking — statische code analyse (SAST)"
      - "pytest testsuite — minimum 80% coverage voor kritieke modules"
      - "Conventional Commits + PR review beleid"
    security_checks:
      - "Dependency scanning: pip-audit + npm audit in CI"
      - "Secret scanning: GitHub secret scanning ingeschakeld"
      - "OWASP Top 10 review bij nieuwe API endpoints"

  - id: "NIS2-M06"
    artikel: "Art. 21(2)(h)"
    naam: "Beleid en procedures inzake cryptografie en encryptie"
    status: "geïmplementeerd"
    implementatie:
      - "HMAC-SHA256 voor alle webhook signatures (webhooks/handlers/)"
      - "JWT RS256 voor API authenticatie (api/lib/jwt.py)"
      - "TLS 1.3 voor alle externe verbindingen"
      - "Bcrypt voor wachtwoordhashing (cost factor: 12)"
      - "AES-256 voor data-at-rest encryptie (PostgreSQL tablespace)"
    verboden:
      - "MD5 of SHA-1 voor security-kritieke hashing"
      - "HTTP (niet-TLS) voor productie endpoints"
      - "Hardgecodeerde secrets in broncode"

  - id: "NIS2-M07"
    artikel: "Art. 21(2)(i)"
    naam: "Personeelsbeveiliging, toegangsbeleid en opleiding"
    status: "gepland"
    openstaande_acties:
      - "NDA + vertrouwelijkheidsclausules opnemen in alle freelance contracten"
      - "Security awareness training voor medewerkers (jaarlijks)"
      - "Onboarding checklist met security-vereisten"
      - "Offboarding procedure: account deactivatie binnen 24u na uitdiensttreding"
    target_datum: "2025-Q1"

  - id: "NIS2-M08"
    artikel: "Art. 21(2)(i)"
    naam: "Toegangscontrole en identiteitsbeheer"
    status: "geïmplementeerd"
    implementatie:
      - "Keycloak RBAC — rolgebaseerde toegangscontrole"
      - "JWT validatie op alle FastAPI endpoints via Depends(verify_jwt)"
      - "Tenant isolatie via client_project_space.py"
      - "Principle of Least Privilege — minimale rechten per rol"
    rollen:
      - naam: "admin"
        rechten: "Volledige toegang — alleen voor VorstersNV medewerkers"
      - naam: "operator"
        rechten: "HITL beslissingen, agent-beheer, geen productie-DB toegang"
      - naam: "analyst"
        rechten: "Lezen van rapporten en compliance logs"
      - naam: "klant"
        rechten: "Eigen projectdata — geen toegang tot andere tenants"
    mfa_vereist: true
    sessie_timeout_minuten: 60

  - id: "NIS2-M09"
    artikel: "Art. 21(2)(f)"
    naam: "Asset management en inventarisatie"
    status: "gedeeltelijk"
    implementatie:
      - "Docker Compose definieert alle runtime-componenten"
      - "requirements.txt + pyproject.toml voor Python dependencies"
      - "package.json voor frontend dependencies"
    openstaande_acties:
      - "software_bill_of_materials.json aanmaken en bijhouden (SBOM)"
      - "Hardware asset register bijhouden voor lokale servers"
      - "Automatische dependency vulnerability scanning integreren in CI"
    target_datum: "2025-Q1"

  - id: "NIS2-M10"
    artikel: "Art. 21(2)(g)"
    naam: "Omgevings- en fysieke beveiliging"
    status: "geïmplementeerd"
    implementatie:
      - "Lokale hardware — geen cloud-hosted productie"
      - "Fysieke toegangsbeveiliging tot serverruimte"
      - "UPS voor stroombeveiliging kritieke systemen"
    aandachtspunten:
      - "Klimaatbeheersing serverruimte documenteren"
      - "Firewall regels jaarlijks reviewen"

# ─────────────────────────────────────────────────────────────────────────────
# AUDIT & LOGGING (NIS2 Art. 21(2)(j))
# ─────────────────────────────────────────────────────────────────────────────

audit:
  log_retentie_jaar: 1
  log_format: "structured JSON (structlog compatible)"
  log_locaties:
    - pad: "logs/compliance/"
      beschrijving: "ComplianceEngine rapporten per project"
    - pad: "logs/dpa/"
      beschrijving: "Data Processing Agreements per project"
    - pad: "logs/decisions/"
      beschrijving: "Decision Journal entries (AI-beslissingen)"
    - pad: "logs/incidents/"
      beschrijving: "NIS2 incident logs en CCN2 meldingen"

  verplichte_audit_events:
    - event: "klantproject_aangemaakt"
      beschrijving: "Nieuw klantproject geregistreerd in het systeem"
      log_level: "INFO"

    - event: "pii_gedetecteerd"
      beschrijving: "PII gedetecteerd en gemaskeerd door PIIScanner"
      log_level: "WARNING"

    - event: "high_risk_capability_uitgevoerd"
      beschrijving: "fraude_detectie_agent of order_verwerking_agent uitvoering"
      log_level: "WARNING"

    - event: "hitl_beslissing_genomen"
      beschrijving: "Menselijke operator heeft AI-beslissing beoordeeld"
      log_level: "INFO"

    - event: "agent_gepromoveerd"
      beschrijving: "Agent versie gepromoveerd naar CANARY of STABLE ring"
      log_level: "INFO"

    - event: "compliance_violation_gedetecteerd"
      beschrijving: "ComplianceEngine heeft CRITICAL of HIGH violation gevonden"
      log_level: "ERROR"

    - event: "incident_gemeld"
      beschrijving: "NIS2 significant incident gemeld bij CCN2.be"
      log_level: "CRITICAL"

    - event: "credentials_geroteerd"
      beschrijving: "API keys, JWT secrets of database credentials geroteerd"
      log_level: "INFO"

    - event: "toegang_geweigerd"
      beschrijving: "Ongeautoriseerde toegangspoging geblokkeerd"
      log_level: "WARNING"

# ─────────────────────────────────────────────────────────────────────────────
# KWETSBAARHEIDSBEHEER (NIS2 Art. 21(2)(e))
# ─────────────────────────────────────────────────────────────────────────────

kwetsbaarheidsbeheer:
  patch_tijdlijnen:
    critical_cve:
      max_patch_dagen: 7
      beschrijving: "CVSS score >= 9.0 — onmiddellijke actie vereist"

    high_cve:
      max_patch_dagen: 30
      beschrijving: "CVSS score 7.0-8.9 — prioritaire opvolging"

    medium_cve:
      max_patch_dagen: 90
      beschrijving: "CVSS score 4.0-6.9 — opnemen in volgende sprintcyclus"

    low_cve:
      max_patch_dagen: 180
      beschrijving: "CVSS score < 4.0 — regulier updatemoment"

  monitoring_bronnen:
    - naam: "NIST NVD"
      url: "https://nvd.nist.gov/vuln/search"
      frequentie: "Wekelijks"

    - naam: "CCN2.be beveiligingsadviezen"
      url: "https://ccb.belgium.be/nl/cybersecurity/tools-en-adviezen"
      frequentie: "Wekelijks"

    - naam: "GitHub Dependabot"
      url: "Automatisch via GitHub repository security settings"
      frequentie: "Continu"

# ─────────────────────────────────────────────────────────────────────────────
# COMPLIANCE INTEGRATIE
# ─────────────────────────────────────────────────────────────────────────────

compliance_integratie:
  modules:
    - naam: "ollama/compliance_engine.py"
      functie: "Multi-laags compliance validatie (EU AI Act, GDPR, NIS2, Belgisch)"
      lagen:
        - "NIS2 incident detectie (check_nis2)"
        - "NIS2 supply chain check (check_nis2)"
        - "NIS2 kwetsbaarheidsbeheer (check_nis2)"

    - naam: "ollama/pii_scanner.py"
      functie: "PII detectie en anonimisering (GDPR Art. 5)"
      koppeling: "Geïntegreerd in ComplianceEngine.check_gdpr()"

    - naam: "ollama/ai_act_compliance.py"
      functie: "EU AI Act risicoklassificatie en HITL audit"
      koppeling: "Geïntegreerd in ComplianceEngine.check_eu_ai_act()"

    - naam: "ollama/decision_journal.py"
      functie: "Audit trail van AI-beslissingen (NIS2 Art. 21(2)(j))"
      uitbreiding_nodig: "Incident log schema toevoegen"

  policy_bestanden:
    - "policies/hitl-policies.yaml"
    - "policies/maturity-policies.yaml"
    - "policies/tool-policies.yaml"
    - "policies/nis2-policies.yaml"   # Dit bestand
